name: Deploy to NAS Web Station

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    # 直接使用 runner 中映射到 Node 24 的镜像，避免额外切换 Node 版本
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      COREPACK_HOME: ${{ github.workspace }}/.corepack
      PNPM_STORE_DIR: ${{ github.workspace }}/.pnpm-store

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore pnpm caches
        uses: actions/cache@v4
        with:
          path: |
            .corepack
            .pnpm-store
          key: ${{ runner.os }}-pnpm-10-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-10-

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.29.2 --activate
          pnpm --version

      - name: Install Dependencies
        run: |
          pnpm config set store-dir "$PNPM_STORE_DIR"
          pnpm config set network-concurrency 4
          pnpm config set fetch-timeout 120000
          pnpm config set fetch-retries 5
          pnpm config set fetch-retry-mintimeout 10000
          pnpm config set fetch-retry-maxtimeout 60000
          pnpm install --frozen-lockfile --prefer-offline

      - name: Build Project
        run: pnpm run build

      - name: Ensure SSH Client
        run: |
          if ! command -v ssh >/dev/null 2>&1; then
            apt-get update
            apt-get install -y openssh-client
          fi
          ssh -V

      - name: Configure SSH Key
        env:
          NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
          NAS_IP: ${{ vars.NAS_IP }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$NAS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ vars.NAS_SSH_PORT }}" "$NAS_IP" >> ~/.ssh/known_hosts

      - name: Prepare Target Directory
        run: |
          ssh -p "${{ vars.NAS_SSH_PORT }}" "${{ vars.NAS_SSH_USER }}@${{ vars.NAS_IP }}" '
            mkdir -p /volume1/docker/api-benchmark/
            rm -rf /volume1/docker/api-benchmark/dist
          '

      # 将构建产物部署到群晖
      - name: Deploy to Synology NAS
        run: |
          scp -P "${{ vars.NAS_SSH_PORT }}" -r dist "${{ vars.NAS_SSH_USER }}@${{ vars.NAS_IP }}:/volume1/docker/api-benchmark/"
          # 上面会把整个 dist 目录复制到目标目录下
          # 最终路径是 /volume1/docker/api-benchmark/dist
