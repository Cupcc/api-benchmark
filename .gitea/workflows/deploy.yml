name: Deploy to NAS Web Station

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: alpine # 确保你的 Gitea Runner 配置了对应的 label (如 ubuntu-latest)
    defaults:
      run:
        shell: sh  # Alpine 无 bash，使用 sh (ash)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 使用 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 # 或者你想使用的 pnpm 版本

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm run build

      - name: Install SSH Client
        run: apk add --no-cache openssh-client

      - name: Configure SSH Key
        env:
          NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
          NAS_IP: ${{ vars.NAS_IP }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$NAS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ vars.NAS_SSH_PORT }}" "$NAS_IP" >> ~/.ssh/known_hosts

      - name: Prepare Target Directory
        run: |
          ssh -p "${{ vars.NAS_SSH_PORT }}" "${{ vars.NAS_SSH_USER }}@${{ vars.NAS_IP }}" '
            mkdir -p /volume1/docker/api-benchmark/
            rm -rf /volume1/docker/api-benchmark/dist
          '

      # 将构建产物部署到群晖
      - name: Deploy to Synology NAS
        run: |
          scp -P "${{ vars.NAS_SSH_PORT }}" -r dist "${{ vars.NAS_SSH_USER }}@${{ vars.NAS_IP }}:/volume1/docker/api-benchmark/"
          # 上面会把整个 dist 目录复制到目标目录下
          # 最终路径是 /volume1/docker/api-benchmark/dist
